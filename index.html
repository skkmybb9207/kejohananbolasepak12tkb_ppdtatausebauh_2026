<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejohanan Bola Sepak 12TKB 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .red-gradient { background: linear-gradient(135deg, #cc0000 0%, #660000 100%); }
        .card-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { border-bottom: 4px solid #ff0000; color: #ff0000; font-weight: 900; }
        .input-dark { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px; padding: 4px; font-size: 11px; text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <header class="w-full shadow-2xl">
        <img src="https://i.postimg.cc/L4rR3gJL/banner-Bolasepak-Zon-Anap.png" alt="Banner" class="w-full h-auto">
    </header>

    <nav class="sticky top-0 z-50 bg-black/95 p-4 border-b border-white/5 flex justify-around text-[9px] font-bold uppercase tracking-tighter">
        <button onclick="showTab('pasukan')" id="btn-pasukan" class="nav-btn tab-active">PASUKAN</button>
        <button onclick="showTab('jadual')" id="btn-jadual" class="nav-btn">JADUAL</button>
        <button onclick="showTab('keputusan')" id="btn-keputusan" class="nav-btn">KEPUTUSAN</button>
        <button onclick="showTab('skor')" id="btn-skor" class="nav-btn">SKOR</button>
        <button onclick="showTab('admin')" id="btn-admin" class="nav-btn text-gray-700"><i class="fas fa-cog"></i></button>
    </nav>

    <main class="container mx-auto px-4 mt-6 max-w-lg">
        
        <div id="loading" class="flex flex-col items-center my-20 hidden">
            <div class="loader"></div>
        </div>

        <!-- TAB 1: PASUKAN -->
        <section id="tab-pasukan" class="tab-content">
            <img src="https://i.postimg.cc/k4Pv6ncm/jadual-perlawanan.png" class="w-full h-auto rounded-xl shadow-2xl" onerror="this.src='https://via.placeholder.com/500x300?text=Imej+Pasukan+Gagal+Dimuat'">
        </section>

        <!-- TAB 2: JADUAL -->
        <section id="tab-jadual" class="tab-content hidden">
            <img src="https://i.postimg.cc/brJg8mgD/jadual-perlawanan-(1).png" class="w-full h-auto rounded-xl shadow-2xl" onerror="this.src='https://via.placeholder.com/500x300?text=Imej+Jadual+Gagal+Dimuat'">
        </section>

        <!-- TAB 3: KEPUTUSAN -->
        <section id="tab-keputusan" class="tab-content hidden">
            <div id="match-list" class="space-y-4"></div>
        </section>

        <!-- TAB 4: SKOR -->
        <section id="tab-skor" class="tab-content hidden">
            <div id="skor-list" class="space-y-10"></div>
        </section>

        <!-- TAB 5: ADMIN -->
        <section id="tab-admin" class="tab-content hidden">
            <div id="admin-auth" class="card-glass p-8 rounded-2xl text-center border-t-4 border-red-600">
                <input type="password" id="admin-pass" placeholder="KATA LALUAN" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-800 outline-none mb-4 text-center font-bold">
                <button onclick="verifyAdmin()" class="w-full red-gradient p-4 rounded-xl font-black uppercase shadow-lg">LOG MASUK</button>
            </div>

            <div id="admin-panel" class="hidden space-y-10 text-black">
                <div class="flex justify-between items-center text-white border-b border-white/5 pb-2">
                    <span class="text-[10px] font-bold text-green-500 uppercase italic">ADMIN AKTIF</span>
                    <button onclick="location.reload()" class="text-[9px] bg-gray-800 px-3 py-1 rounded">REFRESH</button>
                </div>
                <div id="admin-skor-rows" class="overflow-x-auto bg-white p-2 rounded-xl"></div>
                <div id="admin-match-list" class="space-y-4"></div>
            </div>
        </section>

    </main>

    <footer class="mt-12 text-center text-[9px] text-gray-600 pb-10 uppercase tracking-widest">
        Unit Kokurikulum SK Kuala Muput @ 2026
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwfmaLCAHbT8JPm9okHud_Ili6QLRw7TbY_m2BQ7cpjDUR7VE896YrQv49nB6oH5iw8Ww/exec";
        let DB = null;

        async function refreshData() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const response = await fetch(API_URL);
                DB = await response.json();
                renderUI();
            } catch (e) { alert("Ralat Data! Sila Refresh."); }
            document.getElementById('loading').classList.add('hidden');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('tab-active');
            if(id !== 'pasukan' && id !== 'jadual') refreshData();
        }

        function renderUI() {
            // Render Tab 3: Keputusan
            document.getElementById('match-list').innerHTML = DB.jadual.map(m => `
                <div class="card-glass p-5 rounded-2xl border-l-4 border-red-600">
                    <div class="flex justify-between text-[9px] font-bold text-gray-500 mb-2 uppercase">
                        <span>Match ${m.Match_No} | ${m.Tahap}</span>
                        <span class="text-red-500">${m.Status}</span>
                    </div>
                    <div class="flex items-center justify-between font-black italic">
                        <span class="flex-1 text-center text-xs">${m.Team_1_ID}</span>
                        <span class="bg-red-600 px-4 py-1 rounded-lg text-2xl mx-4">${m.Skor_1} - ${m.Skor_2}</span>
                        <span class="flex-1 text-center text-xs">${m.Team_2_ID}</span>
                    </div>
                </div>`).join('');

            // Render Tab 4: Skor
            document.getElementById('skor-list').innerHTML = ['A', 'B'].map(g => `
                <div class="card-glass rounded-2xl overflow-hidden shadow-xl mb-6">
                    <div class="bg-red-900/20 p-4 font-black italic text-xs uppercase text-red-500">Pasukan ${g}</div>
                    <table class="w-full text-[11px] text-left">
                        <thead class="bg-white/5 uppercase text-gray-500 font-bold">
                            <tr><th class="p-3">Zon</th><th class="p-3 text-center">Mata</th><th class="p-3 text-center">BJ</th></tr>
                        </thead>
                        <tbody>
                            ${DB.kedudukan.filter(t => t.Pasukan.startsWith(g)).map(t => `
                            <tr class="border-t border-white/5">
                                <td class="p-3 font-bold"><span class="text-[8px] text-gray-600 mr-1">${t.Pasukan}</span> ${t.Zon}</td>
                                <td class="p-3 text-center font-black text-red-500 text-lg">${t.Mata}</td>
                                <td class="p-3 text-center text-gray-400 font-bold italic">${t['Beza Jaringan (BJ)']}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`).join('');

            // Render Admin: Skor Manual
            document.getElementById('admin-skor-rows').innerHTML = `
                <table class="w-full text-[10px]">
                    <tr class="bg-gray-100 uppercase"><th>ID</th><th>M</th><th>K</th><th>S</th><th>Mata</th><th>BJ</th><th>Zon</th><th>S</th></tr>
                    ${DB.kedudukan.map(t => `
                    <tr class="border-b">
                        <td class="font-bold p-1">${t.Pasukan}</td>
                        <td><input type="number" id="m-${t.Pasukan}" value="${t.Menang}" class="w-8 border"></td>
                        <td><input type="number" id="k-${t.Pasukan}" value="${t.Kalah}" class="w-8 border"></td>
                        <td><input type="number" id="s-${t.Pasukan}" value="${t.Seri}" class="w-8 border"></td>
                        <td><input type="number" id="mata-${t.Pasukan}" value="${t.Mata}" class="w-8 border font-bold"></td>
                        <td><input type="number" id="bj-${t.Pasukan}" value="${t['Beza Jaringan (BJ)']}" class="w-8 border"></td>
                        <td><input type="text" id="z-${t.Pasukan}" value="${t.Zon}" class="w-16 border"></td>
                        <td><button onclick="saveManual('${t.Pasukan}')" class="bg-green-600 text-white p-1 rounded">OK</button></td>
                    </tr>`).join('')}
                </table>`;
        }

        function verifyAdmin() {
            if (document.getElementById('admin-pass').value === "ZONANAP2026") {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                renderUI();
            } else { alert("SALAH!"); }
        }

        async function saveManual(id) {
            const body = {
                action: 'updateManualStandings',
                pasukanId: id,
                zon: document.getElementById(`z-${id}`).value,
                menang: document.getElementById(`m-${id}`).value,
                kalah: document.getElementById(`k-${id}`).value,
                seri: document.getElementById(`s-${id}`).value,
                mata: document.getElementById(`mata-${id}`).value,
                jaringan: 0, bolos: 0, 
                beza: document.getElementById(`bj-${id}`).value,
                kedudukan: 1
            };
            document.getElementById('loading').classList.remove('hidden');
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(body) });
            alert("Berjaya!");
            refreshData();
        }

        window.onload = () => showTab('pasukan');
    </script>
</body>
</html>
